server {
    listen 80;

    root /usr/share/nginx/html;

    # /admin/api/sse/ → backend SSE
    location /admin/api/sse/ {
        proxy_pass http://tableorder-backend:8000/sse/;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        add_header X-Accel-Buffering no;
    }

    # /admin/api/static/ → backend static files
    location /admin/api/static/ {
        proxy_pass http://tableorder-backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /admin/api/ → backend REST
    location /admin/api/ {
        proxy_pass http://tableorder-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # 모든 요청 → index.html (React Router가 /admin prefix 처리)
    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
