services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - table-order-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/tableorder
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: 16
      CORS_ORIGINS: https://eveningsip.frozentea.org
    volumes:
      - backend_uploads:/app/static/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - table-order-network

  customer-frontend:
    build:
      context: ./customer-frontend
    ports:
      - "3000:80"
    networks:
      - table-order-network
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tableorder-customer.rule=Host(`eveningsip.frozentea.org`) && PathPrefix(`/order`)"
      - "traefik.http.services.tableorder-customer.loadbalancer.server.port=80"
      - "traefik.http.routers.tableorder-customer.tls=true"
      - "traefik.http.routers.tableorder-customer.entrypoints=websecure"
      - "traefik.http.routers.tableorder-customer.tls.certresolver=cloudflare"

  admin-frontend:
    build:
      context: ./admin-frontend
    ports:
      - "3001:80"
    networks:
      - table-order-network
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tableorder-admin.rule=Host(`eveningsip.frozentea.org`)"
      - "traefik.http.services.tableorder-admin.loadbalancer.server.port=80"
      - "traefik.http.routers.tableorder-admin.tls=true"
      - "traefik.http.routers.tableorder-admin.entrypoints=websecure"
      - "traefik.http.routers.tableorder-admin.tls.certresolver=cloudflare"

volumes:
  postgres_data:
  backend_uploads:

networks:
  table-order-network:
    driver: bridge
  proxy:
    external: true
