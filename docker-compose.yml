services:
  tableorder-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  tableorder-backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tableorder-postgres:5432/tableorder
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: 16
      CORS_ORIGINS: https://eveningsip.frozentea.org
    volumes:
      - backend_uploads:/app/static/uploads
    depends_on:
      tableorder-postgres:
        condition: service_healthy
    networks:
      - proxy

  tableorder-customer:
    build:
      context: ./customer-frontend
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tableorder-customer.rule=Host(`eveningsip.frozentea.org`)"
      - "traefik.http.services.tableorder-customer.loadbalancer.server.port=80"
      - "traefik.http.routers.tableorder-customer.tls=true"
      - "traefik.http.routers.tableorder-customer.entrypoints=websecure"
      - "traefik.http.routers.tableorder-customer.tls.certresolver=cloudflare"
      - "traefik.http.middlewares.tableorder-sse.headers.customresponseheaders.X-Accel-Buffering=no"

  tableorder-admin:
    build:
      context: ./admin-frontend
    networks:
      - proxy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

networks:
  proxy:
    external: true
